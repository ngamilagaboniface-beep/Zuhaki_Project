<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | ZUHAKI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("{{ url_for('static', filename='zuhaki_bg.png') }}"); background-size: cover; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">
    <div class="w-full max-w-md bg-zinc-900/80 backdrop-blur-xl p-10 rounded-[2.5rem] border border-zinc-800 text-center">
        <img src="{{ url_for('static', filename='logo512.png') }}" class="h-16 mx-auto mb-6">
        <form action="/login" method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username" required class="w-full bg-black border border-zinc-800 p-4 rounded-xl">
            <input type="password" name="password" placeholder="Password" required class="w-full bg-black border border-zinc-800 p-4 rounded-xl">
            <button class="w-full bg-emerald-500 text-black font-black py-4 rounded-xl uppercase">Login</button>
        </form>
        <a href="https://wa.me/255677404749?text=Zuhaki%20Admin%20Reset%20Request" class="block mt-8 text-[10px] text-zinc-500 uppercase font-bold hover:text-emerald-400">Forgot Password? Contact Support</a>
    </div>
</body>
</html>
