<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | ZUHAKI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-12">
    <div class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <img src="{{ url_for('static', filename='logo512.png') }}" class="h-10">
        <a href="/logout" class="bg-red-600 px-6 py-2 rounded-xl text-xs font-bold uppercase">Logout</a>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
        <div class="bg-zinc-900 p-10 rounded-[2.5rem] border border-zinc-800">
            <h2 class="text-emerald-400 font-black uppercase text-xs mb-8">Post New Property</h2>
            <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-4">
                <select name="mode" class="w-full bg-black p-4 rounded-xl border border-zinc-800 text-sm">
                    <option value="property">Sale</option>
                    <option value="listing">Rental/Plot</option>
                </select>
                <input type="text" name="name" placeholder="Title" required class="w-full bg-black p-4 rounded-xl border border-zinc-800 text-sm">
                <input type="text" name="loc" placeholder="Location" class="w-full bg-black p-4 rounded-xl border border-zinc-800 text-sm">
                <input type="number" name="price" placeholder="Price (TZS)" required class="w-full bg-black p-4 rounded-xl border border-zinc-800 text-sm">
                <textarea name="desc" placeholder="Details" class="w-full bg-black p-4 rounded-xl border border-zinc-800 text-sm h-24"></textarea>
                <input type="file" name="file" required class="w-full bg-black p-4 rounded-xl border border-zinc-800 text-xs">
                <button class="w-full bg-emerald-600 py-4 rounded-xl font-black uppercase text-xs">Publish</button>
            </form>
        </div>

        <div class="bg-zinc-900 p-10 rounded-[2.5rem] border border-zinc-800 overflow-y-auto h-[600px]">
            <h2 class="text-zinc-500 font-black uppercase text-xs mb-8">Client Inquiries</h2>
            {% for i in inquiries %}
            <div class="bg-black p-4 rounded-xl border border-zinc-800 mb-4">
                <p class="font-bold text-sm">{{ i.client_name }}</p>
                <p class="text-emerald-400 font-black text-xs">{{ i.client_phone }}</p>
                <p class="text-[9px] text-zinc-500 uppercase mt-2">{{ i.property_name }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
